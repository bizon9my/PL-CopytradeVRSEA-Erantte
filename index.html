<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRS EA Terminal - Laporan Prestasi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; }
        .neon-green { color: #00ffa3; filter: drop-shadow(0 0 8px rgba(0, 255, 163, 0.3)); }
        .neon-red { color: #ff3b69; filter: drop-shadow(0 0 8px rgba(255, 59, 105, 0.3)); }
        .glass { background: rgba(22, 22, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // URL Google Apps Script anda
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyScZPgtCs_XlRkYNxfz9iMVWHD_hRrZlkWGQZuE_biAKLFeqwxC4OvA_mDsDh9MAoD/exec";
        const CACHE_KEY = "vrs_terminal_cache_v1";
        const LOGO_URL = "https://i.postimg.cc/Jz4PC4jG/CANVA-RK-PRO-(11).png";

        const App = () => {
            const [data, setData] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState('');
            const [editingItem, setEditingItem] = useState(null);
            const [editForm, setEditForm] = useState({ pl: '', percent: '' });
            
            const [equity, setEquity] = useState(1000);
            const [month, setMonth] = useState('February');
            const [year, setYear] = useState(2025);
            const [currency, setCurrency] = useState('USD');
            const [broker, setBroker] = useState('VRS Broker');
            
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [settingsForm, setSettingsForm] = useState({ month: 'February', year: 2025, currency: 'USD', equity: 1000, broker: 'VRS Broker' });
            
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('');

            const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            const getDaysInMonth = (m, y) => new Date(y, new Date(`${m} 1, ${y}`).getMonth() + 1, 0).getDate();
            const getStartDayOfMonth = (m, y) => new Date(`${m} 1, ${y}`).getDay();

            const totalPL = data.reduce((sum, item) => sum + (item.pl || 0), 0);
            const totalPercent = equity > 0 ? (totalPL / equity) * 100 : 0;

            // Memuatkan cache semasa mula-mula aplikasi dibuka
            useEffect(() => {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    try {
                        const parsed = JSON.parse(cached);
                        if (parsed.data) setData(parsed.data);
                        if (parsed.settings) {
                            setEquity(parsed.settings.equity);
                            setMonth(parsed.settings.month);
                            setYear(parsed.settings.year);
                            setCurrency(parsed.settings.currency);
                            setBroker(parsed.settings.broker);
                        }
                    } catch (e) {
                        console.error("Gagal membaca cache", e);
                    }
                }
                fetchData(); 
            }, []);

            const updateCache = (newData, newSettings) => {
                const cacheData = {
                    data: newData || data,
                    settings: newSettings || { equity, month, year, currency, broker },
                    lastUpdated: new Date().getTime()
                };
                localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
            };

            const fetchData = () => {
                setIsLoading(true);
                setSyncStatus('Syncing Terminal...');
                fetch(SCRIPT_URL + "?timestamp=" + new Date().getTime())
                    .then(res => res.json())
                    .then(result => {
                        let updatedData = data;
                        let updatedSettings = { equity, month, year, currency, broker };

                        if (result.data) {
                            updatedData = result.data.filter(i => i.date).sort((a, b) => a.date - b.date);
                            setData(updatedData);
                        }
                        if (result.settings) {
                            updatedSettings = {
                                equity: parseFloat(result.settings.equity) || 1000,
                                month: result.settings.month || 'February',
                                year: parseInt(result.settings.year) || 2025,
                                currency: result.settings.currency || 'USD',
                                broker: result.settings.broker || 'VRS Broker'
                            };
                            setEquity(updatedSettings.equity);
                            setMonth(updatedSettings.month);
                            setYear(updatedSettings.year);
                            setCurrency(updatedSettings.currency);
                            setBroker(updatedSettings.broker);
                        }
                        
                        // Simpan ke cache selepas fetch berjaya
                        updateCache(updatedData, updatedSettings);
                        
                        setIsLoading(false);
                        setSyncStatus('Terminal Live ✅');
                        setTimeout(() => setSyncStatus(''), 3000);
                    })
                    .catch(() => {
                        setSyncStatus('Offline Mode (Cached) ⚠️');
                        setIsLoading(false);
                    });
            };

            const sendToGas = async (payload) => {
                setSyncStatus('Updating Cloud...');
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });
                    setSyncStatus('Execution Success ✅');
                    setTimeout(() => setSyncStatus(''), 3000);
                    return true;
                } catch {
                    setSyncStatus('Local Save Only (Sync Failed) ❌');
                    return false;
                }
            };

            const handleSaveDay = async () => {
                const plVal = editForm.pl === '' ? null : parseFloat(editForm.pl);
                const pctVal = editForm.percent === '' ? null : parseFloat(editForm.percent);
                const newData = data.map(d => d.date === editingItem.date ? { ...d, pl: plVal, percent: pctVal } : d);
                
                // Simpan ke State dan Cache dahulu
                setData(newData);
                updateCache(newData, null);
                
                setEditingItem(null);
                // Kemudian sync ke Google Sheet
                await sendToGas({ action: 'updateDay', date: editingItem.date, pl: plVal, percent: pctVal });
            };

            const handleSaveSettings = async () => {
                const s = settingsForm;
                const newSettings = { 
                    equity: parseFloat(s.equity), 
                    month: s.month, 
                    year: parseInt(s.year), 
                    currency: s.currency, 
                    broker: s.broker 
                };
                
                // Simpan ke State dan Cache dahulu
                setEquity(newSettings.equity); 
                setMonth(newSettings.month); 
                setYear(newSettings.year); 
                setCurrency(newSettings.currency); 
                setBroker(newSettings.broker);
                updateCache(null, newSettings);
                
                setShowSettingsModal(false);
                // Kemudian sync ke Google Sheet
                await sendToGas({ action: 'updateSettings', ...s, equity: parseFloat(s.equity), year: parseInt(s.year) });
            };

            const formatValue = (v) => {
                if (v === null || v === '' || isNaN(v)) return null;
                return (v >= 0 ? '+' : '') + parseFloat(v).toFixed(2);
            };

            const calendarGrid = [];
            const start = getStartDayOfMonth(month, year);
            for (let i = 0; i < start; i++) calendarGrid.push({ isBlank: true });
            for (let i = 1; i <= getDaysInMonth(month, year); i++) {
                calendarGrid.push(data.find(d => parseInt(d.date) === i) || { date: i, pl: null, percent: null });
            }

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
                    {/* Glow Backgrounds */}
                    <div className="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#00ffa3]/5 blur-[120px] rounded-full pointer-events-none"></div>
                    <div className="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#ff3b69]/5 blur-[120px] rounded-full pointer-events-none"></div>

                    <div className="bg-[#0f0f11] w-full max-w-[440px] rounded-[32px] overflow-hidden border border-white/5 shadow-2xl relative">
                        {/* Header */}
                        <div className="bg-[#16161a] p-6 border-b border-white/5">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-[#00ffa3] animate-pulse"></div>
                                    <span className="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">VRS EA Terminal</span>
                                </div>
                                <div className="flex gap-2">
                                    {isAdmin && <button onClick={() => { setSettingsForm({ month, year, currency, equity, broker }); setShowSettingsModal(true); }} className="p-2 rounded-lg bg-white/5 text-zinc-400">⚙️</button>}
                                    <button onClick={() => isAdmin ? setIsAdmin(false) : setShowLoginModal(true)} className={`p-2 rounded-lg ${isAdmin ? 'bg-[#ff3b69]/20 text-[#ff3b69]' : 'bg-white/5 text-zinc-500'}`}>
                                        {isAdmin ? '🔓' : '🔒'}
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex flex-col items-center text-center mb-4">
                                <img 
                                    src={LOGO_URL} 
                                    alt="VRS EA Logo" 
                                    className="h-16 w-auto mb-3 object-contain drop-shadow-[0_0_10px_rgba(0,255,163,0.2)]"
                                    onerror="this.style.display='none'"
                                />
                                <h1 className="text-xl font-bold bg-gradient-to-r from-white to-zinc-500 bg-clip-text text-transparent uppercase tracking-tight">Laporan Prestasi Harian</h1>
                                <p className="text-xs text-zinc-500 mt-1">Broker: <span className="text-[#00ffa3] font-bold">{broker}</span></p>
                            </div>
                        </div>

                        <div className="p-6">
                            {/* Stats */}
                            <div className="grid grid-cols-1 gap-4 mb-8">
                                <div className="bg-[#16161a] rounded-2xl p-5 border border-white/5 flex justify-between items-center">
                                    <div>
                                        <div className="text-[11px] uppercase text-zinc-500 font-bold mb-0.5 tracking-widest">Total Equity</div>
                                        <div className="text-2xl font-bold">{equity.toLocaleString()} <span className="text-sm font-normal text-zinc-600">{currency}</span></div>
                                    </div>
                                    <span className="text-2xl">📊</span>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-[#16161a] rounded-2xl p-4 border border-white/5">
                                        <div className="text-[10px] uppercase text-zinc-500 font-bold mb-1 tracking-widest">📈 {month.substring(0,3)} P/L</div>
                                        <div className={`text-xl font-bold ${totalPL >= 0 ? 'neon-green' : 'neon-red'}`}>{formatValue(totalPL)}</div>
                                    </div>
                                    <div className="bg-[#16161a] rounded-2xl p-4 border border-white/5">
                                        <div className="text-[10px] uppercase text-zinc-500 font-bold mb-1 tracking-widest">Return Rate</div>
                                        <div className={`text-xl font-bold ${totalPercent >= 0 ? 'neon-green' : 'neon-red'}`}>{formatValue(totalPercent)}%</div>
                                    </div>
                                </div>
                            </div>

                            {/* Calendar */}
                            <div className="flex justify-between items-center mb-6 px-1">
                                <div className="text-sm font-bold">📅 {month} {year}</div>
                                {syncStatus && <span className="text-[10px] font-bold neon-green bg-[#00ffa3]/10 px-2.5 py-1 rounded-full">{syncStatus}</span>}
                            </div>

                            <div className="grid grid-cols-7 mb-4 border-b border-white/5 pb-2 text-center text-[10px] font-black text-zinc-600 uppercase tracking-tighter">
                                {daysOfWeek.map(d => <div key={d}>{d}</div>)}
                            </div>

                            <div className="grid grid-cols-7 gap-y-4 gap-x-1">
                                {calendarGrid.map((item, i) => (
                                    <div key={i} onClick={() => !item.isBlank && isAdmin && (setEditingItem(item), setEditForm({ pl: item.pl || '', percent: item.percent || '' }))}
                                        className={`flex flex-col items-center justify-start h-14 rounded-xl border border-transparent transition-all ${!item.isBlank && isAdmin ? 'cursor-pointer hover:bg-white/5 active:scale-95' : ''}`}>
                                        {!item.isBlank && (
                                            <>
                                                <span className={`text-[13px] font-bold mb-1.5 ${item.pl !== null ? 'text-white' : 'text-zinc-600'}`}>{item.date}</span>
                                                {item.pl !== null && (
                                                    <div className="flex flex-col items-center leading-none">
                                                        <span className={`text-[9px] font-black uppercase ${item.pl >= 0 ? 'neon-green' : 'neon-red'}`}>{item.pl >= 0 ? 'Win' : 'Loss'}</span>
                                                        <span className={`text-[10px] font-bold ${item.pl >= 0 ? 'neon-green' : 'neon-red'}`}>{formatValue(item.pl)}</span>
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Modals */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-md">
                            <div className="bg-[#16161a] p-8 rounded-[32px] border border-white/10 w-full max-w-[320px] text-center">
                                <h3 className="text-xl font-bold mb-6">Terminal Authorization</h3>
                                <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && (passwordInput === "admin123" ? (setIsAdmin(true), setShowLoginModal(false)) : setLoginError("Invalid Key"))}
                                    className="w-full bg-black/40 text-white p-4 rounded-2xl border border-white/5 outline-none mb-2 text-center tracking-[0.5em]" placeholder="••••••" autoFocus />
                                {loginError && <p className="text-[#ff3b69] text-[10px] font-bold uppercase mb-4">{loginError}</p>}
                                <button onClick={() => passwordInput === "admin123" ? (setIsAdmin(true), setShowLoginModal(false)) : setLoginError("Invalid Key")} className="w-full py-4 rounded-2xl bg-[#00ffa3] text-black font-black uppercase tracking-widest shadow-lg">Authorize</button>
                                <button onClick={() => setShowLoginModal(false)} className="mt-4 text-zinc-500 text-[11px] font-bold uppercase">Cancel</button>
                            </div>
                        </div>
                    )}

                    {editingItem && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-md">
                            <div className="bg-[#16161a] p-8 rounded-[32px] border border-white/10 w-full max-w-[340px]">
                                <h3 className="text-xl font-bold mb-8">Log: {editingItem.date} {month.substring(0,3)}</h3>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-zinc-500 text-[10px] font-black uppercase mb-2 block tracking-widest">P/L Amount ({currency})</label>
                                        <input type="number" value={editForm.pl} onChange={e => setEditForm({...editForm, pl: e.target.value, percent: e.target.value ? ((e.target.value / equity) * 100).toFixed(2) : ''})}
                                            className="w-full bg-black/40 text-white p-4 rounded-2xl border border-white/5 outline-none text-lg font-bold" />
                                    </div>
                                    <div>
                                        <label className="text-zinc-500 text-[10px] font-black uppercase mb-2 block tracking-widest">Auto Return (%)</label>
                                        <input type="number" value={editForm.percent} onChange={e => setEditForm({...editForm, percent: e.target.value})}
                                            className="w-full bg-black/40 text-white p-4 rounded-2xl border border-white/5 outline-none text-lg font-bold" />
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-10">
                                    <button onClick={() => setEditingItem(null)} className="flex-1 text-zinc-500 text-sm font-bold uppercase">Discard</button>
                                    <button onClick={handleSaveDay} className="flex-1 py-4 rounded-2xl bg-[#00ffa3] text-black font-black uppercase tracking-widest">Commit</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettingsModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-md">
                            <div className="bg-[#16161a] p-8 rounded-[32px] border border-white/10 w-full max-w-[360px]">
                                <h3 className="text-xl font-bold mb-8 uppercase tracking-tighter">System Config</h3>
                                <div className="space-y-5">
                                    <input type="number" value={settingsForm.equity} onChange={e => setSettingsForm({...settingsForm, equity: e.target.value})} placeholder="Equity" className="w-full bg-black/40 text-white p-3 rounded-xl border border-white/5 outline-none" />
                                    <input type="text" value={settingsForm.broker} onChange={e => setSettingsForm({...settingsForm, broker: e.target.value})} placeholder="Broker Name" className="w-full bg-black/40 text-white p-3 rounded-xl border border-white/5 outline-none" />
                                    <div className="grid grid-cols-2 gap-4">
                                        <select value={settingsForm.month} onChange={e => setSettingsForm({...settingsForm, month: e.target.value})} className="w-full bg-black/40 text-white p-3 rounded-xl border border-white/5 outline-none">
                                            {["January","February","March","April","May","June","July","August","September","October","November","December"].map(m => <option key={m} value={m} className="bg-[#16161a]">{m}</option>)}
                                        </select>
                                        <input type="number" value={settingsForm.year} onChange={e => setSettingsForm({...settingsForm, year: e.target.value})} className="w-full bg-black/40 text-white p-3 rounded-xl border border-white/5 outline-none" />
                                    </div>
                                    <input type="text" value={settingsForm.currency} onChange={e => setSettingsForm({...settingsForm, currency: e.target.value})} placeholder="Currency" className="w-full bg-black/40 text-white p-3 rounded-xl border border-white/5 outline-none" />
                                </div>
                                <div className="flex gap-3 mt-10">
                                    <button onClick={() => setShowSettingsModal(false)} className="flex-1 text-zinc-500 text-sm font-bold uppercase">Close</button>
                                    <button onClick={handleSaveSettings} className="flex-1 py-4 rounded-2xl bg-[#00ffa3] text-black font-black uppercase tracking-widest">Apply</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
